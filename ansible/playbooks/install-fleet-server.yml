---
# Prerequisites:
#   - elastic-agent-{{ es_version }}-x86_64.rpm in /workspace/elastic-ansible/binaries/
#   - elastic_password in secrets.yml
#   - Kibana running on kibana_logstash_nodes
#   - CA cert already extracted at /etc/kibana/certificates/ca.crt on LOGST nodes

# ============================================================
# Play 1: Generate Fleet Server service token
# ============================================================
- name: Generate Fleet Server service token
  hosts: elastic_master_nodes
  become: true
  gather_facts: false
  run_once: true

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Load secrets
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/secrets.yml

    - name: Delete existing Fleet Server service token if present
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ http_port }}/_security/service/elastic/fleet-server/credential/token/fleet-server-token"
        method: DELETE
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 404]

    - name: Generate Fleet Server service token
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ http_port }}/_security/service/elastic/fleet-server/credential/token/fleet-server-token"
        method: POST
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 201]
      register: token_response

    - name: Set fleet server token fact
      ansible.builtin.set_fact:
        fleet_server_token: "{{ token_response.json.token.value }}"

    - name: Display service token
      ansible.builtin.debug:
        msg: "Fleet Server service token: {{ fleet_server_token }}"


# ============================================================
# Play 2: Install and enroll Fleet Server on LOGST nodes
# ============================================================
- name: Install and enroll Fleet Server
  hosts: kibana_logstash_nodes
  become: true
  gather_facts: false
  serial: 1

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Load secrets
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/secrets.yml

    - name: Set Fleet Server token from master node
      ansible.builtin.set_fact:
        fleet_server_token: "{{ hostvars[groups['elastic_master_nodes'][0]]['fleet_server_token'] }}"

    # ----------------------------------------------------------
    # Install
    # ----------------------------------------------------------
    - name: Copy Elastic Agent RPM
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/binaries/elastic-agent-{{ es_version }}-x86_64.rpm
        dest: /tmp/elastic-agent-{{ es_version }}-x86_64.rpm
        mode: '0644'

    - name: Install Elastic Agent RPM
      ansible.builtin.command: rpm -Uvh /tmp/elastic-agent-{{ es_version }}-x86_64.rpm
      args:
        creates: /usr/bin/elastic-agent

    # ----------------------------------------------------------
    # TLS certificates
    # ----------------------------------------------------------
    - name: Ensure Fleet cert directory exists
      ansible.builtin.file:
        path: /etc/elastic-agent/certs
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: Copy node certificate (PKCS12)
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/certs/{{ inventory_hostname }}/{{ inventory_hostname }}.p12
        dest: /etc/elastic-agent/certs/{{ inventory_hostname }}.p12
        owner: root
        group: root
        mode: '0640'

    - name: Extract server certificate (PEM)
      ansible.builtin.command: >
        openssl pkcs12 -legacy
        -in /etc/elastic-agent/certs/{{ inventory_hostname }}.p12
        -clcerts -nokeys
        -out /etc/elastic-agent/certs/fleet-server.crt
        -passin pass:
      args:
        creates: /etc/elastic-agent/certs/fleet-server.crt

    - name: Extract server key (PEM)
      ansible.builtin.command: >
        openssl pkcs12 -legacy
        -in /etc/elastic-agent/certs/{{ inventory_hostname }}.p12
        -nocerts -nodes
        -out /etc/elastic-agent/certs/fleet-server.key
        -passin pass:
      args:
        creates: /etc/elastic-agent/certs/fleet-server.key

    - name: Set key permissions
      ansible.builtin.file:
        path: /etc/elastic-agent/certs/fleet-server.key
        owner: root
        group: root
        mode: '0600'

    # ----------------------------------------------------------
    # Enroll as Fleet Server (servers flavor required for fleet-server component)
    # ----------------------------------------------------------
    - name: Uninstall existing Elastic Agent to allow clean re-install with servers flavor
      ansible.builtin.command: /usr/bin/elastic-agent uninstall --force
      failed_when: false
      changed_when: true

    - name: Install Elastic Agent as Fleet Server with servers flavor
      ansible.builtin.command: >
        /usr/bin/elastic-agent install
        --url=https://{{ bind_ip }}:8220
        --fleet-server-es=https://{{ hostvars[groups['elastic_master_nodes'][0]]['bind_ip'] }}:{{ http_port }}
        --fleet-server-service-token={{ fleet_server_token }}
        --fleet-server-es-ca=/etc/kibana/certificates/ca.crt
        --fleet-server-cert=/etc/elastic-agent/certs/fleet-server.crt
        --fleet-server-cert-key=/etc/elastic-agent/certs/fleet-server.key
        --fleet-server-policy=fleet-server-policy
        --fleet-server-port=8220
        --install-servers
        --force
      changed_when: true

    # ----------------------------------------------------------
    # Verify
    # ----------------------------------------------------------
    - name: Wait for Fleet Server to be accessible
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:8220/api/status"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403]
      register: fleet_check
      retries: 20
      delay: 15
      until: fleet_check.status in [200, 401, 403]


# ============================================================
# Play 3: Configure Fleet Server URL in Kibana
# ============================================================
- name: Configure Fleet settings in Kibana
  hosts: kibana_logstash_nodes
  become: true
  gather_facts: false
  run_once: true

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Load secrets
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/secrets.yml

    - name: Configure Fleet Server hosts in Kibana
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ kibana_port | default(5601) }}/api/fleet/settings"
        method: PUT
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          fleet_server_hosts:
            - "https://{{ hostvars[groups['kibana_logstash_nodes'][0]]['bind_ip'] }}:8220"
            - "https://{{ hostvars[groups['kibana_logstash_nodes'][1]]['bind_ip'] }}:8220"
        headers:
          kbn-xsrf: "true"
        status_code: [200]
