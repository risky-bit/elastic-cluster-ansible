---
# Prerequisites:
#   - elastic-agent-9.3.4-linux-x86_64.tar.gz in /workspace/elastic-ansible/binaries/
#   - elastic_password and fleet_server_service_token in secrets.yml
#   - Kibana running on kibana_logstash_nodes
#   - CA cert at /etc/kibana/certificates/ca.crt on LOGST nodes
#   - fleet-server-policy created in Kibana Fleet UI with Fleet Server integration attached
#   - Node must be clean: no prior elastic-agent installation

# ============================================================
# Play 1: Initialize Fleet in Kibana
# ============================================================
- name: Initialize Fleet in Kibana
  hosts: kibana_logstash_nodes
  become: true
  gather_facts: false
  run_once: true

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Load secrets
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/secrets.yml

    - name: Initialize Fleet setup
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ kibana_port | default(5601) }}/api/fleet/setup"
        method: POST
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: true
        validate_certs: false
        headers:
          kbn-xsrf: "true"
        status_code: [200]


# ============================================================
# Play 2: Install Fleet Server from tar.gz
# ============================================================
- name: Install Fleet Server from tar.gz
  hosts: kibana_logstash_nodes
  become: true
  gather_facts: false
  serial: 1

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Load secrets
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/secrets.yml

    # ----------------------------------------------------------
    # Transfer and extract tar.gz
    # ----------------------------------------------------------
    - name: Copy Elastic Agent tar.gz to node
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/binaries/elastic-agent-{{ es_version }}-linux-x86_64.tar.gz
        dest: /tmp/elastic-agent-{{ es_version }}-linux-x86_64.tar.gz
        mode: '0644'

    - name: Extract Elastic Agent tar.gz
      ansible.builtin.unarchive:
        src: /tmp/elastic-agent-{{ es_version }}-linux-x86_64.tar.gz
        dest: /tmp/
        remote_src: true
        creates: /tmp/elastic-agent-{{ es_version }}-linux-x86_64

    # ----------------------------------------------------------
    # TLS certificates
    # ----------------------------------------------------------
    - name: Ensure Fleet cert directory exists
      ansible.builtin.file:
        path: /etc/elastic-agent/certs
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: Copy node certificate (PKCS12)
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/certs/{{ inventory_hostname }}/{{ inventory_hostname }}.p12
        dest: /etc/elastic-agent/certs/{{ inventory_hostname }}.p12
        owner: root
        group: root
        mode: '0640'

    - name: Extract server certificate (PEM)
      ansible.builtin.command: >
        openssl pkcs12 -legacy
        -in /etc/elastic-agent/certs/{{ inventory_hostname }}.p12
        -clcerts -nokeys
        -out /etc/elastic-agent/certs/fleet-server.crt
        -passin pass:
      args:
        creates: /etc/elastic-agent/certs/fleet-server.crt

    - name: Extract server key (PEM)
      ansible.builtin.command: >
        openssl pkcs12 -legacy
        -in /etc/elastic-agent/certs/{{ inventory_hostname }}.p12
        -nocerts -nodes
        -out /etc/elastic-agent/certs/fleet-server.key
        -passin pass:
      args:
        creates: /etc/elastic-agent/certs/fleet-server.key

    - name: Set key permissions
      ansible.builtin.file:
        path: /etc/elastic-agent/certs/fleet-server.key
        owner: root
        group: root
        mode: '0600'

    # ----------------------------------------------------------
    # Install as Fleet Server with servers flavor
    # ----------------------------------------------------------
    - name: Install Elastic Agent as Fleet Server
      ansible.builtin.command: >
        ./elastic-agent install
        --url=https://{{ bind_ip }}:8220
        --fleet-server-es=https://{{ hostvars[groups['elastic_master_nodes'][0]]['bind_ip'] }}:{{ http_port }}
        --fleet-server-service-token={{ fleet_server_service_token }}
        --fleet-server-es-ca=/etc/kibana/certificates/ca.crt
        --fleet-server-cert=/etc/elastic-agent/certs/fleet-server.crt
        --fleet-server-cert-key=/etc/elastic-agent/certs/fleet-server.key
        --certificate-authorities=/etc/kibana/certificates/ca.crt
        --fleet-server-policy=fleet-server-policy
        --fleet-server-port=8220
        --fleet-server-timeout=10m
        --install-servers
        --force
      args:
        chdir: /tmp/elastic-agent-{{ es_version }}-linux-x86_64
      changed_when: true

    # ----------------------------------------------------------
    # Verify
    # ----------------------------------------------------------
    - name: Wait for Fleet Server to be accessible
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:8220/api/status"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403]
      register: fleet_check
      retries: 20
      delay: 15
      until: fleet_check.status in [200, 401, 403]
