---
# Rolling reconfiguration — renders elasticsearch.yml and restarts one node at a time.
# Prerequisites:
#   - elastic_password must be set in group_vars/all/secrets.yml
#   - Cluster must be GREEN before running
#
# Order: data nodes first, then masters. Masters stay up throughout data restarts.

- name: Rolling reconfigure Elasticsearch
  hosts: elastic_data_nodes:elastic_master_nodes
  become: true
  gather_facts: false
  serial: 1

  vars:
    # Always target a master that is NOT the node currently being restarted
    api_host: >-
      {{ hostvars[
        (groups['elastic_master_nodes'] | reject('equalto', inventory_hostname) | list)[0]
      ]['bind_ip'] }}

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Load secrets
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/secrets.yml

    # ----------------------------------------------------------
    # Pre-restart: pause shard movement to avoid churn
    # ----------------------------------------------------------
    - name: Disable shard allocation
      ansible.builtin.uri:
        url: "https://{{ api_host }}:{{ http_port }}/_cluster/settings"
        method: PUT
        body_format: json
        body:
          persistent:
            cluster.routing.allocation.enable: "none"
        user: elastic
        password: "{{ elastic_password }}"
        validate_certs: false

    # ----------------------------------------------------------
    # Config + restart
    # ----------------------------------------------------------
    - name: Render elasticsearch.yml
      ansible.builtin.template:
        src: /workspace/elastic-ansible/ansible/templates/elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Restart Elasticsearch
      ansible.builtin.systemd:
        name: elasticsearch
        state: restarted

    # ----------------------------------------------------------
    # Post-restart: wait for this node, then restore allocation
    # ----------------------------------------------------------
    - name: Wait for node HTTP to respond
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ http_port }}/_cluster/health"
        method: GET
        user: elastic
        password: "{{ elastic_password }}"
        validate_certs: false
        status_code: 200
      register: node_health
      retries: 30
      delay: 10
      until: node_health.status == 200

    - name: Re-enable shard allocation
      ansible.builtin.uri:
        url: "https://{{ api_host }}:{{ http_port }}/_cluster/settings"
        method: PUT
        body_format: json
        body:
          persistent:
            cluster.routing.allocation.enable: "all"
        user: elastic
        password: "{{ elastic_password }}"
        validate_certs: false

    - name: Wait for cluster to return to green
      ansible.builtin.uri:
        url: "https://{{ api_host }}:{{ http_port }}/_cluster/health?wait_for_status=green&timeout=120s"
        method: GET
        user: elastic
        password: "{{ elastic_password }}"
        validate_certs: false
        status_code: 200
      register: cluster_health
      retries: 20
      delay: 15
      until: cluster_health.json.status == "green"
