---
# Prerequisites:
#   - monitoring_kibana_nodes group defined in inventory (MON01 + MON02)
#   - mon_kibana_encryption_key, mon_kibana_security_key, mon_kibana_reporting_key in secrets.yml
#   - Kibana RPM in /workspace/elastic-ansible/binaries/
#   - Certs for MON01/MON02 in /workspace/elastic-ansible/certs/<hostname>/

# ============================================================
# Play 1: Reset kibana_system password on monitoring cluster
# ============================================================
- name: Reset kibana_system password on monitoring cluster
  hosts: monitoring_nodes
  become: true
  gather_facts: false
  run_once: true

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Reset kibana_system user password
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-reset-password
        -u kibana_system -b -f
        --url https://{{ bind_ip }}:{{ http_port }}
        -E xpack.security.http.ssl.verification_mode=none
      register: kibana_pwd_output
      changed_when: true
      retries: 5
      delay: 15
      until: kibana_pwd_output.rc == 0

    - name: Extract kibana_system password
      ansible.builtin.set_fact:
        mon_kibana_system_password: "{{ (kibana_pwd_output.stdout | regex_search('New value:\\s*(\\S+)', '\\1'))[0] }}"

    - name: Append kibana_system password to mon-credentials.txt
      ansible.builtin.lineinfile:
        path: /root/mon-credentials.txt
        line: "kibana_system: {{ mon_kibana_system_password }}"
        create: true
        mode: '0600'


# ============================================================
# Play 2: Install and configure monitoring Kibana
# ============================================================
- name: Install and configure monitoring Kibana
  hosts: monitoring_kibana_nodes
  become: true
  gather_facts: false
  serial: 1

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Load secrets
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/secrets.yml

    - name: Set kibana_system password from monitoring cluster play
      ansible.builtin.set_fact:
        mon_kibana_system_password: "{{ hostvars[groups['monitoring_nodes'][0]]['mon_kibana_system_password'] }}"

    # ----------------------------------------------------------
    # Install
    # ----------------------------------------------------------
    - name: Copy Kibana RPM to node
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/binaries/kibana-{{ es_version }}-x86_64.rpm
        dest: /tmp/kibana-{{ es_version }}-x86_64.rpm
        mode: '0644'

    - name: Install Kibana RPM
      ansible.builtin.command: rpm -Uvh /tmp/kibana-{{ es_version }}-x86_64.rpm
      args:
        creates: /usr/share/kibana/bin/kibana

    # ----------------------------------------------------------
    # TLS certificates
    # ----------------------------------------------------------
    - name: Ensure certificate directory exists
      ansible.builtin.file:
        path: /etc/kibana/certificates
        state: directory
        owner: root
        group: kibana
        mode: '0750'

    - name: Copy node certificate
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/certs/{{ inventory_hostname }}/{{ inventory_hostname }}.p12
        dest: /etc/kibana/certificates/{{ inventory_hostname }}.p12
        owner: root
        group: kibana
        mode: '0640'

    - name: Copy CA certificate (PKCS12)
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/certs/elastic-stack-ca.p12
        dest: /etc/kibana/certificates/elastic-stack-ca.p12
        owner: root
        group: kibana
        mode: '0640'

    - name: Extract CA certificate as PEM for Elasticsearch SSL trust
      ansible.builtin.command: >
        openssl pkcs12
        -legacy
        -in /etc/kibana/certificates/elastic-stack-ca.p12
        -nokeys
        -out /etc/kibana/certificates/ca.crt
        -passin pass:
      args:
        creates: /etc/kibana/certificates/ca.crt

    - name: Set CA certificate ownership
      ansible.builtin.file:
        path: /etc/kibana/certificates/ca.crt
        owner: root
        group: kibana
        mode: '0640'

    # ----------------------------------------------------------
    # Configuration
    # ----------------------------------------------------------
    - name: Render kibana.yml
      ansible.builtin.template:
        src: /workspace/elastic-ansible/ansible/templates/kibana-monitoring.yml.j2
        dest: /etc/kibana/kibana.yml
        owner: root
        group: kibana
        mode: '0660'
      notify: Restart Kibana

    # ----------------------------------------------------------
    # Start
    # ----------------------------------------------------------
    - name: Enable and start Kibana
      ansible.builtin.systemd:
        name: kibana
        enabled: true
        daemon_reload: true
        state: started

    - name: Pause to allow Kibana to start or fail fast
      ansible.builtin.pause:
        seconds: 15

    - name: Verify Kibana service is still running
      ansible.builtin.command: systemctl is-active kibana
      register: kibana_active
      failed_when: kibana_active.stdout != "active"
      changed_when: false

    - name: Wait for Kibana to be accessible
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ kibana_port | default(5601) }}/api/status"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403, 503]
      register: kibana_check
      retries: 40
      delay: 15
      until: kibana_check.status in [200, 401, 403]

  handlers:
    - name: Restart Kibana
      ansible.builtin.systemd:
        name: kibana
        state: restarted
