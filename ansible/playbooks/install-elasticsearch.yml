---
# ============================================================
# Play 1: Install and configure all main cluster nodes
# ============================================================
- name: Install and configure Elasticsearch
  hosts: elastic_master_nodes:elastic_data_nodes
  become: true
  gather_facts: false
  serial: 1

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    # ----------------------------------------------------------
    # Install
    # ----------------------------------------------------------
    - name: Copy Elasticsearch RPM to node
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/binaries/elasticsearch-{{ es_version }}-x86_64.rpm
        dest: /tmp/elasticsearch-{{ es_version }}-x86_64.rpm
        mode: '0644'

    - name: Install Elasticsearch RPM
      ansible.builtin.command: rpm -Uvh /tmp/elasticsearch-{{ es_version }}-x86_64.rpm
      args:
        creates: /usr/share/elasticsearch/bin/elasticsearch

    # ----------------------------------------------------------
    # JVM heap
    # ----------------------------------------------------------
    - name: Set heap size fact
      ansible.builtin.set_fact:
        heap_size: "{{ es_heap_master if inventory_hostname in groups['elastic_master_nodes'] else es_heap_data }}"

    - name: Configure JVM heap
      ansible.builtin.copy:
        dest: /etc/elasticsearch/jvm.options.d/heap.options
        content: |
          -Xms{{ heap_size }}
          -Xmx{{ heap_size }}
        owner: root
        group: elasticsearch
        mode: '0660'

    # ----------------------------------------------------------
    # TLS certificates
    # ----------------------------------------------------------
    - name: Ensure certificate directory exists
      ansible.builtin.file:
        path: /etc/elasticsearch/certificates
        state: directory
        owner: root
        group: elasticsearch
        mode: '0750'

    - name: Copy node certificate
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/certs/{{ inventory_hostname }}/{{ inventory_hostname }}.p12
        dest: /etc/elasticsearch/certificates/{{ inventory_hostname }}.p12
        owner: root
        group: elasticsearch
        mode: '0640'

    - name: Copy CA certificate
      ansible.builtin.copy:
        src: /workspace/elastic-ansible/certs/elastic-stack-ca.p12
        dest: /etc/elasticsearch/certificates/elastic-stack-ca.p12
        owner: root
        group: elasticsearch
        mode: '0640'

    # ----------------------------------------------------------
    # Configuration
    # ----------------------------------------------------------
    - name: Render elasticsearch.yml
      ansible.builtin.template:
        src: /workspace/elastic-ansible/ansible/templates/elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'
      vars:
        setup_mode: "{{ true if inventory_hostname == groups['elastic_master_nodes'][0] else false }}"

    # ----------------------------------------------------------
    # Ensure data and log directories owned by elasticsearch
    # ----------------------------------------------------------
    - name: Ensure data directory ownership
      ansible.builtin.file:
        path: "{{ path_data }}"
        state: directory
        owner: elasticsearch
        group: elasticsearch
        mode: '2750'

    - name: Ensure log directory ownership
      ansible.builtin.file:
        path: "{{ path_logs }}"
        state: directory
        owner: elasticsearch
        group: elasticsearch
        mode: '2750'


# ============================================================
# Play 2: Bootstrap first master
# ============================================================
- name: Bootstrap first master node
  hosts: es_bootstrap_node
  become: true
  gather_facts: false

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Enable and start Elasticsearch on bootstrap node
      ansible.builtin.systemd:
        name: elasticsearch
        enabled: true
        daemon_reload: true
        state: started

    - name: Wait for Elasticsearch HTTP to respond
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ http_port }}"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403]
      register: es_boot
      retries: 30
      delay: 15
      until: es_boot is succeeded

    - name: Reset elastic user password
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-reset-password
        -u elastic -b
        --url https://{{ bind_ip }}:{{ http_port }}
        -E xpack.security.http.ssl.verification_mode=none
      register: elastic_pwd_output
      changed_when: true

    - name: Extract elastic password
      ansible.builtin.set_fact:
        elastic_password: "{{ (elastic_pwd_output.stdout | regex_search('New value:\\s*(\\S+)', '\\1'))[0] }}"

    - name: Reset kibana_system user password
      ansible.builtin.command: >
        /usr/share/elasticsearch/bin/elasticsearch-reset-password
        -u kibana_system -b
        --url https://{{ bind_ip }}:{{ http_port }}
        -E xpack.security.http.ssl.verification_mode=none
      register: kibana_pwd_output
      changed_when: true

    - name: Extract kibana_system password
      ansible.builtin.set_fact:
        kibana_system_password: "{{ (kibana_pwd_output.stdout | regex_search('New value:\\s*(\\S+)', '\\1'))[0] }}"

    - name: Display generated passwords
      ansible.builtin.debug:
        msg:
          - "elastic password: {{ elastic_password }}"
          - "kibana_system password: {{ kibana_system_password }}"

    - name: Save passwords to file on bootstrap node
      ansible.builtin.copy:
        dest: /root/es-credentials.txt
        content: |
          elastic: {{ elastic_password }}
          kibana_system: {{ kibana_system_password }}
        mode: '0600'


# ============================================================
# Play 3: Start all remaining nodes
# ============================================================
- name: Start Elasticsearch on all remaining nodes
  hosts: elastic_master_nodes:elastic_data_nodes
  become: true
  gather_facts: false
  serial: 1

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Enable and start Elasticsearch
      ansible.builtin.systemd:
        name: elasticsearch
        enabled: true
        daemon_reload: true
        state: started

    - name: Wait for Elasticsearch HTTP to respond
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ http_port }}"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403]
      register: es_node_check
      retries: 20
      delay: 15
      until: es_node_check is succeeded


# ============================================================
# Play 4: Verify cluster and remove initial_master_nodes
# ============================================================
- name: Verify cluster and finalise configuration
  hosts: es_bootstrap_node
  become: true
  gather_facts: false

  tasks:

    - name: Load global variables
      ansible.builtin.include_vars:
        file: /workspace/elastic-ansible/ansible/inventory/group_vars/all/vars.yml

    - name: Query cluster health
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ http_port }}/_cluster/health"
        method: GET
        user: elastic
        password: "{{ hostvars[inventory_hostname].elastic_password }}"
        force_basic_auth: true
        validate_certs: false
        return_content: true
      register: cluster_health

    - name: Assert cluster is green or yellow
      ansible.builtin.assert:
        that:
          - cluster_health.json.status in ['green', 'yellow']
        fail_msg: "Cluster health is {{ cluster_health.json.status }}. Check logs before proceeding."
        success_msg: "Cluster health is {{ cluster_health.json.status }}."

    - name: Remove initial_master_nodes — render production config on bootstrap node
      ansible.builtin.template:
        src: /workspace/elastic-ansible/ansible/templates/elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'
      vars:
        setup_mode: false

    - name: Restart bootstrap node with production config
      ansible.builtin.systemd:
        name: elasticsearch
        state: restarted

    - name: Wait for bootstrap node to rejoin
      ansible.builtin.uri:
        url: "https://{{ bind_ip }}:{{ http_port }}"
        method: GET
        validate_certs: false
        status_code: [200, 401, 403]
      register: rejoin_check
      retries: 20
      delay: 15
      until: rejoin_check is succeeded
