version: "3.8"

services:
  semaphore-postgres:
    image: ${SEMAPHORE_POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: semaphore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SEMAPHORE_DB:-semaphore}
      POSTGRES_USER: ${SEMAPHORE_DB_USER:-semaphore}
      POSTGRES_PASSWORD: ${SEMAPHORE_DB_PASSWORD:-semaphore}
    volumes:
      - ${SEMAPHORE_STORAGE_DIR:-/data/semaphore}/postgres:/var/lib/postgresql/data:Z

  semaphore:
    image: ${SEMAPHORE_IMAGE:-semaphoreui/semaphore:v2.17.37-ansible2.16.5}
    container_name: semaphore
    restart: unless-stopped
    depends_on:
      - semaphore-postgres
    ports:
      - "${SEMAPHORE_HTTP_PORT:-3000}:3000"
    environment:
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB_HOST: semaphore-postgres
      SEMAPHORE_DB_PORT: 5432
      SEMAPHORE_DB: ${SEMAPHORE_DB:-semaphore}
      SEMAPHORE_DB_USER: ${SEMAPHORE_DB_USER:-semaphore}
      SEMAPHORE_DB_PASS: ${SEMAPHORE_DB_PASSWORD:-semaphore}
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: ${SEMAPHORE_ACCESS_KEY_ENCRYPTION:-changeme-change-me-change-me-change-me}
      SEMAPHORE_PLAYBOOK_PATH: /workspace/elastic-ansible/ansible/playbooks
      SEMAPHORE_ADMIN: ${SEMAPHORE_ADMIN:-admin}
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_ADMIN_PASSWORD:-changeme}
      SEMAPHORE_ADMIN_NAME: ${SEMAPHORE_ADMIN_NAME:-Admin}
      SEMAPHORE_ADMIN_EMAIL: ${SEMAPHORE_ADMIN_EMAIL:-admin@localhost}
      SEMAPHORE_WEB_ROOT: ${SEMAPHORE_WEB_ROOT:-}
    volumes:
      - ${SEMAPHORE_STORAGE_DIR:-/data/semaphore}/data:/var/lib/semaphore:Z
      - ${SEMAPHORE_STORAGE_DIR:-/data/semaphore}/config:/etc/semaphore:Z
      - ${SEMAPHORE_STORAGE_DIR:-/data/semaphore}/tmp:/tmp/semaphore:Z
      - ${WORKSPACE_DIR:-..}:/workspace/elastic-ansible:Z
