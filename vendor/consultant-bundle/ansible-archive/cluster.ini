# Bootstrap ONLY on first master - Needed for elastic 8 and 9 only
es_bootstrap=true
es_first_master=v-dev-mpssa-nvt01.dev.loc

#######################################
# RPM Paths (unified)
#######################################
es_rpm_local_path="bin/elasticsearch-{{ es_version }}.rpm"
