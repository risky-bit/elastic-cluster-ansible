upstream backend {
    server 10.43.1.21:9200;
    server 10.43.1.226:9200;
    server 10.43.1.11:9200;
}

server {
    listen 9200 ssl;
    http2 on;
    server_name 10.43.1.88;   # Replace with your domain or public IP

    ssl_certificate     /etc/nginx/ssl/_.proxy.cert.pem;
    ssl_certificate_key /etc/nginx/ssl/_.proxy.key.pem;

    # Proxy to Elastic
    location / {
        proxy_pass https://backend;   # Or internal ECE host:9243

        # Preserve headers  
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (important for Kibana, Fleet, etc.)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout tuning
        proxy_connect_timeout   3600s;
        proxy_send_timeout      3600s;
        proxy_read_timeout      3600s;
        send_timeout            3600s;
        keepalive_timeout       3600s;
    }
}